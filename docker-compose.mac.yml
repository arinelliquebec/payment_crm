version: "3.8"

services:
  # PostgreSQL para macOS (compatível com Apple Silicon)
  postgres:
    image: postgres:16-alpine
    container_name: crm-arrighi-postgres-mac
    environment:
      - POSTGRES_USER=portfolio_user
      - POSTGRES_PASSWORD=portfolio_password
      - POSTGRES_DB=payment_crm_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_user -d payment_crm_demo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: crm-arrighi-backend-mac
    ports:
      - "5101:5101"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5101
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=payment_crm_demo;Username=portfolio_user;Password=portfolio_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crm-network
    volumes:
      - ./backend:/app
      - /app/bin
      - /app/obj
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5101/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: crm-arrighi-frontend-mac
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5101/api
      - NEXT_PUBLIC_ENVIRONMENT=development
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crm-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

networks:
  crm-network:
    driver: bridge

volumes:
  postgres_data:
