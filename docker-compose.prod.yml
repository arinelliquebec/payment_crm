version: "3.8"

services:
  # PostgreSQL para produção
  postgres:
    image: postgres:16-alpine
    container_name: crm-arrighi-postgres-prod
    environment:
      - POSTGRES_USER=portfolio_user
      - POSTGRES_PASSWORD=portfolio_password
      - POSTGRES_DB=payment_crm_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - crm-network-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio_user -d payment_crm_demo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API para produção
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: crm-arrighi-backend-prod
    ports:
      - "5101:5101"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5101
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=payment_crm_demo;Username=portfolio_user;Password=portfolio_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crm-network-prod
    restart: unless-stopped

  # Frontend para produção
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: crm-arrighi-frontend-prod
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5101/api
      - NEXT_PUBLIC_ENVIRONMENT=production
    depends_on:
      - backend
    networks:
      - crm-network-prod
    restart: unless-stopped

networks:
  crm-network-prod:
    driver: bridge

volumes:
  postgres_prod_data:
